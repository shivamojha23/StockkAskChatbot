version: "3.9"

services:
  # ── FastAPI Backend ──────────────────────────────────────────
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: stockkbot-api
    env_file: ./backend/.env
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app        # Hot reload in dev
    command: >
      uvicorn main:app
      --host 0.0.0.0
      --port 8000
      --reload
      --log-level info
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  # ── Static Web / Frontend ─────────────────────────────────────
  frontend:
    image: nginx:alpine
    container_name: stockkbot-frontend
    ports:
      - "3000:80"
    volumes:
      - ./frontend:/usr/share/nginx/html
    restart: unless-stopped


<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>StockkBot Widget — Demo</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #0A1628;
      color: #E8EDF5;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
    }
    .logo { font-size: 32px; font-weight: 800; color: #00C896; margin-bottom: 12px; }
    .subtitle { color: rgba(255,255,255,0.5); font-size: 15px; text-align: center; }
    .badge {
      margin-top: 20px;
      background: rgba(0,200,150,0.1);
      border: 1px solid rgba(0,200,150,0.3);
      color: #00C896;
      border-radius: 20px;
      padding: 6px 16px;
      font-size: 13px;
    }
    .arrow {
      margin-top: 60px;
      color: rgba(255,255,255,0.3);
      font-size: 14px;
      animation: bob 1.5s ease-in-out infinite;
    }
    @keyframes bob {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(6px); }
    }
  </style>
</head>
<body>
  <div class="logo">StockkAsk</div>
  <div class="subtitle">AI Stock Research Platform · Powered by Indira Securities</div>
  <div class="badge">✦ StockkBot is live in the bottom-right corner</div>
  <div class="arrow">↘ Click the chat bubble to start →</div>

  <!--
    Embed the chatbot widget.
    In production, replace data-api-url with your deployed FastAPI URL.
  -->
  <script
    src="chatbot-widget.js"
    data-api-url="http://20.2.1.169:8000"
    data-theme="dark"
    data-position="bottom-right"
    defer
  ></script>
</body>
</html>
